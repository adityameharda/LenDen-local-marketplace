<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="View messages with buyers and sellers on LeniDeni marketplace."
    />
    <meta name="theme-color" content="#1555b8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Messages - LeniDeni</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <header class="navbar">
      <div class="container">
        <a class="brand" href="/index.html" aria-label="Go to home page">
          <span>LeniDeni</span>
        </a>
        <nav class="nav-links">
          <a href="/index.html">Browse</a>
          <a href="/dashboard.html" data-auth="user">Dashboard</a>
          <a href="/my-listings.html" data-auth="user">My listings</a>
          <a href="/messages.html" data-auth="user">Messages</a>
          <a href="/admin.html" data-role="admin">Admin</a>
          <button
            class="btn secondary"
            type="button"
            data-auth="user"
            data-logout
          >
            Logout
          </button>
        </nav>
      </div>
    </header>

    <main class="container">
      <div style="margin-bottom: 32px">
        <h2
          style="
            font-size: 32px;
            margin: 24px 0 8px 0;
            font-weight: 800;
            color: var(--on-surface);
          "
        >
          Messages
        </h2>
        <p style="color: var(--on-surface-variant); margin: 0; font-size: 16px">
          Connect with buyers and sellers in your community.
        </p>
      </div>
      <div id="messagesLoader" class="loader">⏳ Loading messages...</div>
      <p id="messagesNotice" class="notice"></p>
      <section class="chat-layout">
        <aside class="chat-sidebar">
          <div
            class="chat-sidebar-header"
            style="font-weight: 700; font-size: 16px; color: var(--on-surface)"
          >
            Your Conversations
          </div>
          <div id="threadList" class="chat-thread-list"></div>
        </aside>
        <section class="chat-panel">
          <div
            class="chat-panel-header"
            id="chatHeader"
            style="color: var(--on-surface-variant)"
          >
            Select a conversation to start messaging.
          </div>
          <div class="chat-panel-body" id="chatBody"></div>
          <form
            class="chat-input"
            id="chatForm"
            style="
              background: var(--surface-variant);
              padding: 16px;
              border-radius: 12px;
            "
          >
            <textarea
              class="input"
              name="content"
              rows="2"
              placeholder="Type your message..."
              required
            ></textarea>
            <div class="chat-input-actions" style="gap: 8px">
              <button
                class="btn secondary"
                type="button"
                id="cancelEditBtn"
                hidden
                style="padding: 8px 16px"
              >
                Cancel
              </button>
              <button
                class="btn"
                type="submit"
                id="chatSubmitBtn"
                style="padding: 8px 24px"
              >
                Send →
              </button>
            </div>
          </form>
        </section>
      </section>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/shared.js"></script>
    <script src="/js/messages.js"></script>
  </body>
</html>
