<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="View detailed listing information on LeniDeni marketplace."
    />
    <meta name="theme-color" content="#1555b8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Product - LeniDeni</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <header class="navbar">
      <div class="container">
        <a class="brand" href="/index.html" aria-label="Go to home page">
          <span>LeniDeni</span>
        </a>
        <nav class="nav-links">
          <a href="/browse.html">Browse</a>
          <a href="/dashboard.html" data-auth="user">Dashboard</a>
          <a href="/my-listings.html" data-auth="user">My listings</a>
          <a href="/messages.html" data-auth="user">Messages</a>
          <a href="/admin.html" data-role="admin">Admin</a>
          <a href="/login.html" data-auth="guest">Login</a>
          <a href="/register.html" class="btn" data-auth="guest">Sell</a>
          <a href="/dashboard.html?create=1" data-auth="user">Create listing</a>
          <button
            class="btn secondary"
            type="button"
            data-auth="user"
            data-logout
          >
            Logout
          </button>
        </nav>
      </div>
    </header>

    <main class="container">
      <div id="productLoader" class="loader">⏳ Loading listing...</div>
      <section id="productDetails"></section>

      <section class="form-card" style="max-width: 400px">
        <h3
          style="
            margin: 0 0 16px 0;
            font-size: 20px;
            font-weight: 700;
            color: var(--on-surface);
          "
        >
          Interested?
        </h3>
        <button
          id="favoriteBtn"
          class="btn secondary"
          type="button"
          style="width: 100%; height: 40px; margin-bottom: 12px"
        >
          ♥ Save to favorites
        </button>
        <button
          id="reportListingBtn"
          class="btn secondary"
          type="button"
          style="width: 100%; height: 40px; margin-bottom: 12px; display: none"
        >
          Report listing
        </button>
        <button
          id="reportSellerBtn"
          class="btn secondary"
          type="button"
          style="width: 100%; height: 40px; margin-bottom: 12px; display: none"
        >
          Report seller
        </button>
        <p id="productNotice" class="notice"></p>
      </section>
    </main>

    <div class="modal-overlay" id="contactModal">
      <div
        class="modal"
        style="
          background: var(--surface);
          border: 1px solid var(--outline-variant);
          border-radius: 16px;
        "
      >
        <div
          class="modal-header"
          style="
            border-bottom: 1px solid var(--outline-variant);
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
          "
        >
          <h3
            style="
              margin: 0;
              font-size: 20px;
              font-weight: 700;
              color: var(--on-surface);
            "
          >
            Send message to seller
          </h3>
          <button
            class="icon-btn"
            type="button"
            id="contactClose"
            aria-label="Close"
            style="
              background: none;
              border: none;
              font-size: 20px;
              cursor: pointer;
              color: var(--on-surface-variant);
            "
          >
            ✕
          </button>
        </div>
        <div style="padding: 20px 24px">
          <p class="meta" id="contactMeta" style="margin-bottom: 16px"></p>
          <form id="contactForm" class="form-grid">
            <div style="display: flex; flex-direction: column; gap: 6px">
              <label
                style="
                  font-size: 12px;
                  font-weight: 600;
                  text-transform: uppercase;
                  letter-spacing: 0.1em;
                  color: var(--on-surface-variant);
                "
                >Your Message</label
              >
              <textarea
                class="input"
                name="content"
                rows="4"
                placeholder="Write your message..."
                required
                style="resize: vertical; padding: 12px 16px; min-height: 100px"
              ></textarea>
            </div>
            <button class="btn" type="submit">Send message</button>
          </form>
          <div id="contactLoader" class="loader">✓ Sending...</div>
          <p id="contactNotice" class="notice"></p>
        </div>
      </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/shared.js"></script>
    <script src="/js/product.js"></script>
  </body>
</html>
