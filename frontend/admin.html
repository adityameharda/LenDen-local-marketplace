<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="LeniDeni admin control panel for managing users and listings."
    />
    <meta name="theme-color" content="#1555b8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Admin - LeniDeni</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <header class="navbar">
      <div class="container">
        <a class="brand" href="/index.html" aria-label="Go to home page">
          <span>LeniDeni</span>
        </a>
        <nav class="nav-links">
          <a href="/index.html">Browse</a>
          <a href="/dashboard.html" class="btn" data-auth="user">Dashboard</a>
          <a href="/messages.html" data-auth="user">Messages</a>
          <button
            class="btn secondary"
            type="button"
            data-auth="user"
            data-logout
          >
            Logout
          </button>
        </nav>
      </div>
    </header>

    <main class="container">
      <div style="margin-bottom: 32px">
        <h2
          style="
            font-size: 32px;
            margin: 24px 0 8px 0;
            font-weight: 800;
            color: var(--on-surface);
          "
        >
          Admin Control
        </h2>
        <p style="color: var(--on-surface-variant); margin: 0; font-size: 16px">
          Manage users, listings, and platform settings.
        </p>
      </div>
      <div id="adminLoader" class="loader">⏳ Loading admin data...</div>
      <p id="adminNotice" class="notice"></p>

      <section class="card-grid" id="statsGrid"></section>

      <h3 class="section-title">Users</h3>
      <table class="table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="userTable"></tbody>
      </table>

      <h3 class="section-title">Listings</h3>
      <table class="table">
        <thead>
          <tr>
            <th>Title</th>
            <th>Category</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="listingTable"></tbody>
      </table>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/shared.js"></script>
    <script src="/js/admin.js"></script>
  </body>
</html>
