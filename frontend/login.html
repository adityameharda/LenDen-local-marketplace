<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Login to your LeniDeni account to browse listings and manage your sales."
    />
    <meta name="theme-color" content="#1555b8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Login - LeniDeni</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body class="auth-page">
    <header class="navbar">
      <div class="container">
        <a class="brand" href="/index.html" aria-label="Go to home page">
          <span>LeniDeni</span>
        </a>
        <nav class="nav-links">
          <a href="/index.html">Browse</a>
          <a href="/dashboard.html" data-auth="user">Dashboard</a>
          <a href="/messages.html" data-auth="user">Messages</a>
          <a href="/register.html" class="btn" data-auth="guest"
            >Create account</a
          >
          <button
            class="btn secondary"
            type="button"
            data-auth="user"
            data-logout
          >
            Logout
          </button>
        </nav>
      </div>
    </header>

    <main class="container auth-shell">
      <section class="form-card">
        <div style="margin-bottom: 24px">
          <h2
            style="
              font-size: 28px;
              margin: 0 0 8px 0;
              font-weight: 800;
              color: var(--on-surface);
            "
          >
            Welcome back
          </h2>
          <p class="meta" style="color: var(--on-surface-variant); margin: 0">
            Access your LeniDeni account and manage your listings.
          </p>
        </div>
        <form id="loginForm" class="form-grid">
          <div style="display: flex; flex-direction: column; gap: 6px">
            <label
              style="
                font-size: 12px;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 0.1em;
                color: var(--on-surface-variant);
              "
              >Email or Phone</label
            >
            <input
              class="input"
              name="identifier"
              placeholder="Enter your email or phone"
              autocomplete="username"
              required
            />
          </div>
          <div style="display: flex; flex-direction: column; gap: 6px">
            <label
              style="
                font-size: 12px;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 0.1em;
                color: var(--on-surface-variant);
              "
              >Password</label
            >
            <input
              class="input"
              name="password"
              type="password"
              placeholder="••••••••••••"
              autocomplete="current-password"
              required
            />
          </div>
          <button
            class="btn"
            type="submit"
            style="margin-top: 8px; height: 44px; font-size: 15px"
          >
            Sign In
          </button>
        </form>
        <div id="authLoader" class="loader">✓ Authenticating...</div>
        <p id="authNotice" class="notice"></p>
        <div
          style="
            margin-top: 20px;
            text-align: center;
            padding-top: 20px;
            border-top: 1px solid var(--outline-variant);
          "
        >
          <p
            style="color: var(--on-surface-variant); font-size: 14px; margin: 0"
          >
            Don't have an account?
            <a
              href="/register.html"
              style="
                color: var(--primary);
                font-weight: 600;
                text-decoration: none;
              "
              >Create one</a
            >
          </p>
        </div>
      </section>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/shared.js"></script>
    <script src="/js/login.js"></script>
  </body>
</html>
