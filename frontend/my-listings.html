<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="View and manage all your LeniDeni marketplace listings."
    />
    <meta name="theme-color" content="#1555b8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>My Listings - LeniDeni</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <header class="navbar">
      <div class="container">
        <a class="brand" href="/index.html" aria-label="Go to home page">
          <span>LeniDeni</span>
        </a>
        <nav class="nav-links">
          <a href="/index.html">Browse</a>
          <a href="/dashboard.html" data-auth="user">Dashboard</a>
          <a href="/my-listings.html" data-auth="user">My listings</a>
          <a href="/messages.html" data-auth="user">Messages</a>
          <a href="/admin.html" data-role="admin">Admin</a>
          <button
            class="btn secondary"
            type="button"
            data-auth="user"
            data-logout
          >
            Logout
          </button>
        </nav>
      </div>
    </header>

    <main class="container">
      <div style="margin-bottom: 32px">
        <h2
          style="
            font-size: 32px;
            margin: 24px 0 8px 0;
            font-weight: 800;
            color: var(--on-surface);
          "
        >
          My Listings
        </h2>
        <p style="color: var(--on-surface-variant); margin: 0; font-size: 16px">
          Manage all your active and sold items.
        </p>
      </div>
      <div id="myListingsLoader" class="loader">
        ⏳ Loading your listings...
      </div>
      <p id="myListingsNotice" class="notice"></p>
      <section class="card-grid" id="myListingsGrid"></section>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/shared.js"></script>
    <script src="/js/my-listings.js"></script>
  </body>
</html>
